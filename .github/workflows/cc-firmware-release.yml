# Build Claude Code Duck firmware variants (Ducky PCB + XIAO Seeed S3)
# and attach them as merged single-file binaries to a GitHub Release.
# The web flasher (docs/flash/index.html) references the binaries via
# the "latest release" URL pattern, so each successful release auto-
# updates what gets installed when a user clicks Flash on the Claude
# Code Duck tab.
#
# Trigger: push of a tag matching `cc-v*` (e.g., cc-v1.0.0). Hand-
# trigger: workflow_dispatch from the Actions tab.
#
# Note: separate from the bambu firmware workflow so each product
# moves on its own cadence — `cc-v*` tags fire this one, `bambu-v*`
# tags fire the bambu one. Same .bin upload pattern, different
# release assets (cc-ducky.bin / cc-xiao.bin).
name: Claude Code Duck firmware release

on:
  push:
    tags:
      - 'cc-v*'
  workflow_dispatch:

permissions:
  contents: write   # needed to create releases / upload assets

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: ducky
            sketch_dir: firmware/rubber_duck_s3_ducky
            sketch_file: rubber_duck_s3_ducky.ino
            asset_name: cc-ducky.bin
            label: Claude Code Duck — Ducky PCB
            # Generic ESP32-S3 board — Config.h uses raw GPIO numbers.
            fqbn: 'esp32:esp32:esp32s3:USBMode=hwcdc,CDCOnBoot=cdc,PartitionScheme=default_8MB,FlashSize=8M,PSRAM=opi'
          - variant: xiao
            sketch_dir: firmware/rubber_duck_s3
            sketch_file: rubber_duck_s3.ino
            asset_name: cc-xiao.bin
            label: Claude Code Duck — XIAO Seeed S3
            # Seeed-specific board variant — its pins_arduino.h
            # defines the D0-D10 pin aliases that the sketch's
            # Config.h references (BUTTON_PIN=D5, I2S_BCLK=D1, etc.).
            # Generic esp32s3 doesn't define those, hence the prior
            # "'D5' not declared in this scope" build break.
            fqbn: 'esp32:esp32:XIAO_ESP32S3:USBMode=hwcdc,CDCOnBoot=cdc,PartitionScheme=default_8MB,FlashSize=8M,PSRAM=opi'

    steps:
      - uses: actions/checkout@v4

      - name: Install arduino-cli
        # Official action — handles install, PATH, and PATH-on-windows.
        # Replaces a manual curl|sh pipeline that needed $BINDIR
        # pre-created and broke on the first run.
        uses: arduino/setup-arduino-cli@v2

      - name: Install ESP32 board package
        run: |
          arduino-cli config init
          arduino-cli config add board_manager.additional_urls \
            https://espressif.github.io/arduino-esp32/package_esp32_index.json
          arduino-cli core update-index
          # Pin to a known-good ESP32 core. Bump deliberately when
          # validating against a newer arduino-esp32 release.
          arduino-cli core install esp32:esp32@3.0.7

      - name: Install esptool (for merge_bin)
        run: pip install esptool

      - name: Stamp firmware version into build_opt.h
        # The tag name (cc-v0.1.4 / "manual" for workflow_dispatch) goes
        # into the USB serial-number descriptor so the web flasher can
        # read it back via WebUSB and tell the user which build is on
        # their duck — and whether it's behind latest. No spaces in tag
        # names, so safe to append as a -D flag without the quoting
        # problems that bit USB_PRODUCT.
        run: |
          VERSION="${{ github.ref_name }}"
          echo "-DUSB_SERIAL=\\\"$VERSION\\\"" >> ${{ matrix.sketch_dir }}/build_opt.h
          echo "build_opt.h after stamping:"
          cat ${{ matrix.sketch_dir }}/build_opt.h

      - name: Compile ${{ matrix.label }}
        # FQBN: esp32:esp32:esp32s3 with USB CDC on boot so the chip
        # appears as /dev/cu.usbmodem* without an external UART bridge.
        # PSRAM=opi for the WROOM-1 (ducky PCB) — XIAO Sense's S3 also
        # has PSRAM enabled in its default partition. PartitionScheme
        # default_8MB to match the 8MB flash on both boards.
        #
        # USB manufacturer/product/serial descriptor flags come from
        # each sketch's build_opt.h — arduino-cli picks that up natively
        # since v0.21. We don't pass --build-property here because the
        # spaces in "Claude Code Duck" don't survive bash quoting
        # cleanly through to the gcc command line; the previous step
        # appends USB_SERIAL there for the same reason.
        run: |
          arduino-cli compile \
            --fqbn '${{ matrix.fqbn }}' \
            --output-dir build_${{ matrix.variant }} \
            ${{ matrix.sketch_dir }}

      - name: Merge into single flashable image
        # arduino-cli output: <sketch>.ino.bootloader.bin /
        # .partitions.bin / .ino.bin. Merge into one offset-0 binary
        # so the ESP Web Tools manifest can reference a single file.
        run: |
          cd build_${{ matrix.variant }}
          ls -la
          BOOT=$(ls *.bootloader.bin | head -n1)
          PART=$(ls *.partitions.bin | head -n1)
          APP=$(ls *.ino.bin | head -n1)
          esptool.py --chip esp32s3 merge_bin \
            -o ../${{ matrix.asset_name }} \
            --flash_mode dio --flash_size 8MB --flash_freq 80m \
            0x0     "$BOOT" \
            0x8000  "$PART" \
            0x10000 "$APP"
          cd ..
          ls -la ${{ matrix.asset_name }}

      - name: Upload merged binary as artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: ${{ matrix.asset_name }}
          if-no-files-found: error

  # NOTE: We deliberately do NOT create a GitHub Release for firmware
  # tags anymore. The repo's Releases page is the front door for the
  # widget app (v* tags, with .dmg downloads from QR codes); firmware
  # releases cluttered it and confused users who only need the app.
  # The same-origin binaries committed to docs/flash/firmware/ below
  # serve every flasher fetch. CLI users can grab binaries from
  # https://github.com/ideo/Rubber-Duck/raw/main/docs/flash/firmware/cc-<variant>.bin
  # or from a specific commit/tag for a pinned version.

  # Mirror the freshly-built binaries into docs/flash/firmware/ on main
  # so the GitHub Pages flasher can fetch them same-origin. The
  # `releases/latest/download/<asset>` URL 302-redirects to
  # objects.githubusercontent.com, which doesn't reliably send CORS
  # headers — ESP Web Tools fetch() then fails mid-flash after chip
  # detection already succeeded. Same-origin sidesteps the entire CORS
  # path. See docs/flash/firmware/README.md for the full rationale.
  publish-to-pages:
    needs: build-and-release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/cc-v')
    permissions:
      contents: write
    steps:
      - name: Checkout main (not the tag)
        uses: actions/checkout@v4
        with:
          ref: main
          # Default GITHUB_TOKEN with contents:write is enough to push
          # back to main here; no PAT needed.
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download all variant binaries
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Stage binaries in docs/flash/firmware/
        run: |
          mkdir -p docs/flash/firmware
          find dist -name 'cc-*.bin' -exec cp {} docs/flash/firmware/ \;
          ls -la docs/flash/firmware/

      - name: Write latest.json (version manifest)
        # Tiny JSON manifest the widget firmware updater (and any
        # future on-device OTA) fetches to detect staleness. Keyed by
        # variant since ducky PCB and XIAO carry different .bin files
        # — version is shared because both ship from the same tag.
        # Lives next to the binaries so the widget makes one cheap GET
        # against github.io and compares to its read of the chip's
        # USB serial-number descriptor (we stamp the tag there at
        # build time — see the build_opt.h step above).
        run: |
          cat > docs/flash/firmware/cc-latest.json <<EOF
          {
            "version": "${{ github.ref_name }}",
            "released_at": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "variants": {
              "ducky": {
                "binary": "cc-ducky.bin",
                "url": "https://ideo.github.io/Rubber-Duck/flash/firmware/cc-ducky.bin"
              },
              "xiao": {
                "binary": "cc-xiao.bin",
                "url": "https://ideo.github.io/Rubber-Duck/flash/firmware/cc-xiao.bin"
              }
            }
          }
          EOF
          cat docs/flash/firmware/cc-latest.json

      - name: Commit & push if changed
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add docs/flash/firmware/cc-*.bin docs/flash/firmware/cc-latest.json
          # If the binaries are byte-identical to what's on main (e.g.
          # re-running a tag manually), there's nothing to commit and
          # we exit cleanly without trying to push an empty commit.
          if git diff --staged --quiet; then
            echo "No binary changes vs main — skipping commit."
            exit 0
          fi
          git commit -m "Publish Claude Code Duck firmware ${{ github.ref_name }} [skip ci]"
          git push origin main
