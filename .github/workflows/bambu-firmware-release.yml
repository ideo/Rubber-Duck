# Build all three Bambu Duck firmware variants and attach them as
# merged single-file binaries to a GitHub Release. The static web
# flasher (docs/flash/index.html) references these via the "latest"
# release URL pattern, so each successful release auto-updates what
# anyone visiting the flasher page will install.
#
# Trigger: push of a tag matching `bambu-v*` (e.g., bambu-v1.0.0).
# Hand-trigger: workflow_dispatch from the Actions tab.
name: Bambu Duck firmware release

on:
  push:
    tags:
      - 'bambu-v*'
  workflow_dispatch:

permissions:
  contents: write   # needed to create releases / upload assets

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: ducky
            cmake_flags: ''
            asset_name: bambu-duck-ducky.bin
            label: Ducky PCB
          - variant: xiao
            cmake_flags: '-DDUCK_VARIANT=XIAO'
            asset_name: bambu-duck-xiao.bin
            label: XIAO Seeed S3
          # NOTE: the BAMBU_DUCK_TURNKEY variant is deliberately NOT
          # built or released here. Turnkey firmware connects to a
          # specific relay where the operator supplies shared
          # ElevenLabs creds via env-var secrets — flashing it
          # publicly would let strangers piggyback on our compute +
          # voice quota. Internal IDEO builds are produced locally
          # via `make flash-turnkey` and never published. The build
          # flag remains in the firmware source so anyone running
          # their own relay can produce their own turnkey image.

    steps:
      - uses: actions/checkout@v4

      - name: Build firmware (${{ matrix.label }})
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: v5.3.4
          target: esp32s3
          path: bambu/firmware
          # Pass through the per-variant cmake flags. Builds output to
          # the default `build/` directory which we collect below.
          command: |
            idf.py ${{ matrix.cmake_flags }} build
            python -m esptool --chip esp32s3 merge_bin \
              -o ${{ matrix.asset_name }} \
              --flash_mode dio --flash_size 8MB --flash_freq 80m \
              0x0    build/bootloader/bootloader.bin \
              0x8000 build/partition_table/partition-table.bin \
              0x10000 build/bambu_duck.bin

      - name: Upload merged binary as artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: bambu/firmware/${{ matrix.asset_name }}
          if-no-files-found: error

  # NOTE: We deliberately do NOT create a GitHub Release for firmware
  # tags anymore. See the parallel comment in cc-firmware-release.yml
  # — TL;DR: the Releases page is the app's front door; firmware
  # releases cluttered it. Same-origin binaries in docs/flash/firmware/
  # serve every flasher fetch; CLI users can grab from
  # https://github.com/ideo/Rubber-Duck/raw/main/docs/flash/firmware/bambu-duck-<variant>.bin.

  # Mirror the freshly-built binaries into docs/flash/firmware/ on main
  # so the GitHub Pages flasher fetches them same-origin. The
  # `releases/latest/download/<asset>` URL 302-redirects to
  # objects.githubusercontent.com, which doesn't reliably send CORS
  # headers — ESP Web Tools fetch() then fails mid-flash after chip
  # detection already succeeded. Same-origin sidesteps CORS entirely.
  # See docs/flash/firmware/README.md for the full rationale.
  publish-to-pages:
    needs: build-and-release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/bambu-v')
    permissions:
      contents: write
    steps:
      - name: Checkout main (not the tag)
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download all variant binaries
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Stage binaries in docs/flash/firmware/
        run: |
          mkdir -p docs/flash/firmware
          find dist -name 'bambu-duck-*.bin' -exec cp {} docs/flash/firmware/ \;
          ls -la docs/flash/firmware/

      - name: Write latest.json (version manifest)
        # Tiny JSON manifest the on-device OTA path (esp_https_ota in
        # the duck's main loop) will fetch to detect staleness. Same
        # shape as cc-latest.json so the widget code can share parsing
        # logic between the two products if we ever consolidate.
        run: |
          cat > docs/flash/firmware/bambu-latest.json <<EOF
          {
            "version": "${{ github.ref_name }}",
            "released_at": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "variants": {
              "ducky": {
                "binary": "bambu-duck-ducky.bin",
                "url": "https://ideo.github.io/Rubber-Duck/flash/firmware/bambu-duck-ducky.bin"
              },
              "xiao": {
                "binary": "bambu-duck-xiao.bin",
                "url": "https://ideo.github.io/Rubber-Duck/flash/firmware/bambu-duck-xiao.bin"
              }
            }
          }
          EOF
          cat docs/flash/firmware/bambu-latest.json

      - name: Commit & push if changed
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add docs/flash/firmware/bambu-duck-*.bin docs/flash/firmware/bambu-latest.json
          if git diff --staged --quiet; then
            echo "No binary changes vs main — skipping commit."
            exit 0
          fi
          git commit -m "Publish Bambu Duck firmware ${{ github.ref_name }} [skip ci]"
          git push origin main
