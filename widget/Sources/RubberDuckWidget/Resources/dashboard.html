<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Rubber Duck</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #1a1a2e;
    color: #e0e0e0;
    font-family: "SF Mono", "Fira Code", "Consolas", monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px;
  }

  h1 {
    font-size: 1.4rem;
    color: #f0c040;
    margin-bottom: 4px;
    letter-spacing: 0.05em;
  }

  .status {
    font-size: 0.75rem;
    color: #666;
    margin-bottom: 24px;
  }
  .status.connected { color: #4a9; }
  .status.disconnected { color: #a44; }

  .container {
    width: 100%;
    max-width: 640px;
  }

  /* --- Latest Eval Card --- */
  .eval-card {
    background: #16213e;
    border: 1px solid #2a2a4a;
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 16px;
    transition: border-color 0.3s;
  }
  .eval-card.fresh {
    border-color: #f0c040;
  }

  .eval-header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 12px;
  }
  .eval-source {
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    padding: 2px 8px;
    border-radius: 4px;
    font-weight: 600;
  }
  .eval-source.user { background: #2a4a6a; color: #6ab0f3; }
  .eval-source.claude { background: #3a2a5a; color: #b48afe; }

  .eval-time {
    font-size: 0.65rem;
    color: #555;
  }

  .reaction {
    font-size: 1.2rem;
    color: #f0c040;
    font-style: italic;
    margin-bottom: 4px;
    min-height: 1.5em;
  }
  .summary {
    font-size: 0.85rem;
    color: #8899aa;
    margin-bottom: 12px;
    min-height: 1.2em;
  }

  .preview {
    font-size: 0.7rem;
    color: #556;
    margin-bottom: 16px;
    line-height: 1.4;
    max-height: 2.8em;
    overflow: hidden;
  }

  /* --- Dimension Bars --- */
  .dimension {
    display: flex;
    align-items: center;
    margin-bottom: 8px;
  }
  .dim-label {
    width: 90px;
    font-size: 0.7rem;
    color: #888;
    text-align: right;
    padding-right: 12px;
    flex-shrink: 0;
  }
  .dim-track {
    flex: 1;
    height: 20px;
    background: #0f1a2e;
    border-radius: 4px;
    position: relative;
    overflow: hidden;
  }
  .dim-center {
    position: absolute;
    left: 50%;
    top: 0;
    bottom: 0;
    width: 1px;
    background: #333;
  }
  .dim-bar {
    position: absolute;
    top: 2px;
    bottom: 2px;
    border-radius: 3px;
    transition: left 0.6s ease, width 0.6s ease, background 0.6s ease;
  }
  .dim-value {
    width: 44px;
    font-size: 0.7rem;
    text-align: right;
    padding-left: 8px;
    flex-shrink: 0;
    font-variant-numeric: tabular-nums;
  }

  /* --- History --- */
  .history {
    margin-top: 24px;
  }
  .history h2 {
    font-size: 0.8rem;
    color: #555;
    margin-bottom: 12px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }
  .history-item {
    background: #16213e;
    border: 1px solid #1a1a3a;
    border-radius: 8px;
    padding: 12px 16px;
    margin-bottom: 8px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .history-reaction {
    color: #ccc;
    font-size: 0.8rem;
    font-style: italic;
  }
  .history-source {
    font-size: 0.6rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    opacity: 0.5;
  }
  .history-dots {
    display: flex;
    gap: 3px;
  }
  .history-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    transition: background 0.3s;
  }

  .waiting {
    text-align: center;
    color: #444;
    font-size: 0.85rem;
    padding: 40px 0;
  }

  /* --- Mic monitor (hardware troubleshooting) --- */
  .mic-card {
    background: #16213e;
    border: 1px solid #2a2a4a;
    border-radius: 12px;
    padding: 16px 20px;
    margin-bottom: 16px;
  }
  .mic-card h2 {
    font-size: 0.75rem;
    color: #888;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 10px;
    font-weight: 600;
  }
  .mic-meta {
    font-size: 0.65rem;
    color: #666;
    margin-bottom: 10px;
    line-height: 1.5;
  }
  .mic-meta span { color: #8a8; }
  .mic-meta .off { color: #a66; }
  .mic-meta .health-healthy { color: #40c080; }
  .mic-meta .health-suspect { color: #f0c040; }
  .mic-meta .health-failed { color: #e06060; }
  .mic-meta .health-inactive { color: #778; }
  .mic-meter-wrap {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .mic-meter {
    flex: 1;
    height: 28px;
    background: #0a0f18;
    border-radius: 6px;
    overflow: hidden;
    border: 1px solid #1a2a3a;
  }
  .mic-meter-fill {
    height: 100%;
    width: 0%;
    border-radius: 0 4px 4px 0;
    background: linear-gradient(90deg, #2a6a4a, #40c080, #f0c040);
    transition: width 0.06s linear;
    box-shadow: 0 0 12px rgba(64, 192, 128, 0.35);
  }
  .mic-meter-fill.low {
    background: linear-gradient(90deg, #3a3a5a, #5a5a7a);
    box-shadow: none;
  }
  .mic-pct {
    font-size: 0.8rem;
    font-variant-numeric: tabular-nums;
    color: #9ab;
    width: 44px;
    text-align: right;
    flex-shrink: 0;
  }
</style>
</head>
<body>

<h1>RUBBER DUCK</h1>
<div class="status disconnected" id="status">disconnected</div>

<div class="container">
  <div class="mic-card" id="micCard">
    <h2>Mic input (hardware)</h2>
    <div class="mic-meta" id="micMeta">Waiting for data…</div>
    <div class="mic-meter-wrap">
      <div class="mic-meter" title="Level from the duck’s active mic path (Teensy UAC, ESP32 serial, or Mac mic)">
        <div class="mic-meter-fill low" id="micFill"></div>
      </div>
      <div class="mic-pct" id="micPct">—</div>
    </div>
  </div>

  <div class="eval-card" id="evalCard" style="display:none">
    <div class="eval-header">
      <span class="eval-source" id="evalSource"></span>
      <span class="eval-time" id="evalTime"></span>
    </div>
    <div class="reaction" id="reaction"></div>
    <div class="summary" id="summary"></div>
    <div class="preview" id="preview"></div>
    <div id="dimensions"></div>
  </div>

  <div class="waiting" id="waiting">waiting for conversation...</div>

  <div class="history" id="historySection" style="display:none">
    <h2>History</h2>
    <div id="history"></div>
  </div>
</div>

<script>
const DIMS = ["creativity", "soundness", "ambition", "elegance", "risk"];
const DIM_COLORS_POS = {
  creativity: "#f0c040",
  soundness:  "#40c080",
  ambition:   "#f06040",
  elegance:   "#6ab0f3",
  risk:       "#e04080",
};
const DIM_COLORS_NEG = {
  creativity: "#806020",
  soundness:  "#206040",
  ambition:   "#803020",
  elegance:   "#355878",
  risk:       "#702040",
};

const history = [];
let ws;

function connect() {
  const protocol = location.protocol === "https:" ? "wss:" : "ws:";
  ws = new WebSocket(`${protocol}//${location.host}/ws`);

  ws.onopen = () => {
    document.getElementById("status").textContent = "connected";
    document.getElementById("status").className = "status connected";
  };

  ws.onclose = () => {
    document.getElementById("status").textContent = "disconnected - reconnecting...";
    document.getElementById("status").className = "status disconnected";
    setTimeout(connect, 2000);
  };

  ws.onmessage = (e) => {
    const data = JSON.parse(e.data);
    if (data.type === "mic_level") {
      renderMicLevel(data);
      return;
    }
    if (data.type !== "eval" || !data.scores) return;
    renderEval(data);
    addHistory(data);
  };
}

function renderMicLevel(data) {
  const pct = Math.round(Math.min(1, Math.max(0, data.level)) * 100);
  const fill = document.getElementById("micFill");
  const pctEl = document.getElementById("micPct");
  const meta = document.getElementById("micMeta");

  fill.style.width = pct + "%";
  fill.classList.toggle("low", pct < 3);
  pctEl.textContent = pct + "%";

  const src = data.source || "?";
  const dev = data.device_name ? ` · ${data.device_name}` : "";
  const health = data.health_status || "inactive";
  const reason = data.health_reason ? ` · ${data.health_reason}` : "";
  const fallback = data.fallback_active ? " · local fallback active" : "";
  const state = data.listening
    ? `<span>listening</span>`
    : `<span class="off">not listening</span> (check duck mode &amp; mic menu)`;
  meta.innerHTML = `Path: <span>${src}</span>${dev}<br>${state}<br>Health: <span class="health-${health}">${health}</span>${fallback}${reason}`;
}

function renderEval(data) {
  document.getElementById("waiting").style.display = "none";
  const card = document.getElementById("evalCard");
  card.style.display = "block";

  // Source badge
  const src = document.getElementById("evalSource");
  src.textContent = data.source;
  src.className = `eval-source ${data.source}`;

  // Time
  const t = new Date(data.timestamp);
  document.getElementById("evalTime").textContent = t.toLocaleTimeString();

  // Reaction quote + summary
  document.getElementById("reaction").textContent = `"${data.scores.reaction || "..."}"`;
  document.getElementById("summary").textContent = data.scores.summary || "";

  // Preview
  document.getElementById("preview").textContent = data.text_preview;

  // Dimension bars
  const container = document.getElementById("dimensions");
  container.innerHTML = "";

  for (const dim of DIMS) {
    const val = data.scores[dim] || 0;
    const pct = Math.abs(val) * 50;
    const isPos = val >= 0;

    const row = document.createElement("div");
    row.className = "dimension";

    const label = document.createElement("div");
    label.className = "dim-label";
    label.textContent = dim;

    const track = document.createElement("div");
    track.className = "dim-track";

    const center = document.createElement("div");
    center.className = "dim-center";
    track.appendChild(center);

    const bar = document.createElement("div");
    bar.className = "dim-bar";
    bar.style.background = isPos ? DIM_COLORS_POS[dim] : DIM_COLORS_NEG[dim];
    if (isPos) {
      bar.style.left = "50%";
      bar.style.width = pct + "%";
    } else {
      bar.style.left = (50 - pct) + "%";
      bar.style.width = pct + "%";
    }
    track.appendChild(bar);

    const value = document.createElement("div");
    value.className = "dim-value";
    value.textContent = (val >= 0 ? "+" : "") + val.toFixed(2);
    value.style.color = isPos ? DIM_COLORS_POS[dim] : DIM_COLORS_NEG[dim];

    row.appendChild(label);
    row.appendChild(track);
    row.appendChild(value);
    container.appendChild(row);
  }

  // Flash effect
  card.classList.add("fresh");
  setTimeout(() => card.classList.remove("fresh"), 1500);
}

function addHistory(data) {
  history.unshift(data);
  if (history.length > 20) history.pop();

  const section = document.getElementById("historySection");
  const container = document.getElementById("history");

  if (history.length > 1) {
    section.style.display = "block";
    container.innerHTML = "";

    // Skip the first one (it's the current eval)
    for (let i = 1; i < history.length; i++) {
      const d = history[i];
      const item = document.createElement("div");
      item.className = "history-item";

      const left = document.createElement("div");
      const srcSpan = document.createElement("div");
      srcSpan.className = "history-source";
      srcSpan.textContent = d.source;
      const rxn = document.createElement("div");
      rxn.className = "history-reaction";
      rxn.textContent = `"${d.scores.reaction || "..."}"`;
      left.appendChild(srcSpan);
      left.appendChild(rxn);

      const dots = document.createElement("div");
      dots.className = "history-dots";
      for (const dim of DIMS) {
        const dot = document.createElement("div");
        dot.className = "history-dot";
        const val = d.scores[dim] || 0;
        const color = val >= 0 ? DIM_COLORS_POS[dim] : DIM_COLORS_NEG[dim];
        const opacity = 0.3 + Math.abs(val) * 0.7;
        dot.style.background = color;
        dot.style.opacity = opacity;
        dots.appendChild(dot);
      }

      item.appendChild(left);
      item.appendChild(dots);
      container.appendChild(item);
    }
  }
}

connect();
</script>
</body>
</html>
