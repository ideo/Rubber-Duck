<?xml version="1.0" encoding="UTF-8"?>
<!--
  Generic board silhouette shown when a variant's photo isn't yet
  available. Plain gray-on-gray so the cards still look clean while
  we wait for real product shots. Drop a real <variant>.jpg next to
  this file (ducky-pcb.jpg, xiao-s3.jpg, waveshare-s3.jpg, etc.) and
  the card's <img> tag will replace this background automatically.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <rect width="100" height="100" fill="#f0f0f0"/>
  <rect x="22" y="28" width="56" height="44" rx="4" fill="#d8d8d8"/>
  <rect x="35" y="38" width="30" height="20" rx="2" fill="#bcbcbc"/>
  <circle cx="28" cy="35" r="1.5" fill="#a8a8a8"/>
  <circle cx="72" cy="35" r="1.5" fill="#a8a8a8"/>
  <circle cx="28" cy="65" r="1.5" fill="#a8a8a8"/>
  <circle cx="72" cy="65" r="1.5" fill="#a8a8a8"/>
  <text x="50" y="86" font-family="-apple-system, sans-serif"
        font-size="6" fill="#888" text-anchor="middle">photo coming</text>
</svg>
