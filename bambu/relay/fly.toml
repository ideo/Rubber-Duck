# fly.toml app configuration file generated for duck-duck-print on 2026-05-03T08:36:05-04:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'duck-duck-print'
primary_region = 'iad'

[build]
  dockerfile = 'Dockerfile'

[env]
  DUCKS_DB_PATH = '/data/ducks.db'

[[mounts]]
  source = 'ducks_db'
  destination = '/data'

[http_service]
  internal_port = 8088
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

[checks]
  [checks.health]
    type = 'http'
    interval = '30s'
    timeout = '5s'
    grace_period = '20s'
    method = 'GET'
    path = '/health'

[[vm]]
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256
