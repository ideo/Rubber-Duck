# Bambu Duck relay — Fly.io app config.
#
# `app` is a placeholder; `fly launch` (or the DEPLOY.md runbook) will
# rename this on the user's machine. Self-hosters can edit directly;
# our shared deployment overrides via flyctl --app.
#
# See bambu/docs/MULTI-TENANT-REQ.md for the rationale.

app = "duck-relay"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

# SQLite DB lives on a Fly volume. Volume must exist before first
# deploy: `fly volumes create ducks_db --size 1 --region iad`.
[mounts]
  source = "ducks_db"
  destination = "/data"

[env]
  DUCKS_DB_PATH = "/data/ducks.db"

# Public HTTP+WS on port 8088 inside the container. Fly's edge
# terminates TLS and forwards. force_https flips browser visits from
# http→https; the chip uses ws:// to the same hostname which Fly will
# upgrade to wss internally.
[http_service]
  internal_port = 8088
  force_https = true
  # Don't auto-stop. We hold N persistent MQTT connections (one per
  # duck); a stopped machine = silent ducks until the next request.
  # See risks section of MULTI-TENANT-REQ.md.
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

# Single shared-cpu-1x machine, 256MB. Sized for ~tens of ducks at the
# upper end. See MULTI-TENANT-REQ.md "Sizing" — most of the memory
# headroom is unused.
[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory = "256mb"

[checks]
  [checks.health]
    type = "http"
    interval = "30s"
    timeout = "5s"
    grace_period = "20s"
    method = "GET"
    path = "/health"
